name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        php: [ 8.3, 8.4, 8.5 ]
        laravel: [ 11.*, 12.*, 13.* ]
        stability: [ prefer-lowest, prefer-stable ]

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }} - ${{ matrix.stability }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv
          coverage: none

      - name: Install dependencies
        run: |
          if [[ "${{ matrix.laravel }}" == "11.*" ]]; then
          composer config policy.advisories.block false
          fi
          composer require "laravel/framework:${{ matrix.laravel }}" --no-interaction --no-update
          # nesbot/carbon >=3.10 added ?bool $overflow to Carbon::plus()/minus().
          # Laravel 11.x and 12.x never updated Illuminate\Support\Carbon's override,
          # so on PHP 8.4+ the LSP check is fatal. Cap Carbon for those matrices.
          if [[ "${{ matrix.laravel }}" != "13.*" ]]; then
            composer require "nesbot/carbon:^2.72.6 || >=3.0,<3.10" --no-interaction --no-update
          fi
          composer update --${{ matrix.stability }} --prefer-dist --no-interaction

      - name: Execute tests
        run: vendor/bin/pest
